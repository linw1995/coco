[graph]
targets = [
  "aarch64-apple-darwin",
  "aarch64-unknown-linux-gnu",
  "wasm32-unknown-unknown",
  "x86_64-apple-darwin",
  "x86_64-unknown-linux-gnu",
]
all-features = true

[licenses]
include-dev = false
include-build = true
unused-allowed-license = "allow"
allow = [
  "Apache-2.0",
  "MIT",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT-0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.8
