[package]
name = "coco-llm"
edition.workspace = true
version.workspace = true

[dependencies]
async-trait = "0.1.89"
coco-mem = { path = "../coco-mem" }
nanoid = "0.4.0"
rig = { package = "rig-core", version = "0.32.0", features = ["derive"] }
serde_json = "1.0.149"
snafu = "0.9.0"
tokio = { version = "1.48.0", features = [
  "macros",
  "rt-multi-thread",
  "sync",
  "time",
] }
