name: "Publish Image"

on:
  workflow_call:
    inputs:
      artifact-prefix:
        description: "Prefix for Docker image publication metadata."
        required: true
        type: string
      amd64-output:
        description: "Nix flake output for the amd64 image."
        required: true
        type: string
      arm64-output:
        description: "Nix flake output for the arm64 image."
        required: true
        type: string
      sha-tag-prefix:
        description: "Prefix for the immutable commit SHA tag."
        required: true
        type: string
      manual-tag:
        description: "Optional extra tag to publish."
        required: false
        default: ""
        type: string
      publish-latest-on-main:
        description: "Publish latest for main branch refs."
        required: false
        default: false
        type: boolean
      publish-git-tag:
        description: "Publish the git tag name for tag refs."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  publish-image-arch:
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            nix-output: ${{ inputs.amd64-output }}
            extra-platforms: x86_64-linux
          - arch: arm64
            runner: ubuntu-24.04-arm
            nix-output: ${{ inputs.arm64-output }}
            extra-platforms: aarch64-linux
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-nix

      - name: Build Docker image
        env:
          NIX_CONFIG: |
            extra-platforms = ${{ matrix.extra-platforms }}
        run: nix build --out-link image "${{ matrix.nix-output }}" --print-build-logs

      - name: Prepare Docker image
        shell: bash
        env:
          ARTIFACT_PREFIX: ${{ inputs.artifact-prefix }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          mkdir -p dist
          cp --dereference image "dist/${ARTIFACT_PREFIX}-${ARCH}.tar.gz"

      - name: Inspect corresponding sources
        id: source_inspect
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          state_dir=".container-source-state"
          scripts/export-container-sources.sh \
            inspect \
            image \
            "${state_dir}" \
            "linux-${ARCH}"
          dependency_key="$(< "${state_dir}/DEPENDENCY_KEY")"
          if [[ ! "${dependency_key}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::Invalid dependency source key."
            exit 1
          fi
          printf 'dependency_key=%s\n' "${dependency_key}" >> "${GITHUB_OUTPUT}"

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Check dependency source layer
        id: source_dependency
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          DEPENDENCY_KEY: ${{ steps.source_inspect.outputs.dependency_key }}
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          dependency_tag="source-dependencies-v1-linux-${ARCH}-${DEPENDENCY_KEY}"
          dependency_tag_ref="${image}:${dependency_tag}"

          if dependency_result="$(
            nix run nixpkgs#crane -- digest "${dependency_tag_ref}" 2>&1
          )"; then
            if [[ ! "${dependency_result}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "::error::Invalid dependency source manifest digest."
              exit 1
            fi
            cache_hit="true"
            echo "Found dependency source layer ${dependency_tag_ref}@${dependency_result}."
          elif grep -Eqi \
            '(MANIFEST_UNKNOWN|manifest unknown|NAME_UNKNOWN|name unknown|not found|404)' \
            <<< "${dependency_result}"; then
            cache_hit="false"
            echo "Dependency source layer ${dependency_tag_ref} is missing."
          else
            echo "${dependency_result}" >&2
            exit 1
          fi

          printf 'cache_hit=%s\n' "${cache_hit}" >> "${GITHUB_OUTPUT}"
          printf 'tag_ref=%s\n' "${dependency_tag_ref}" >> "${GITHUB_OUTPUT}"

      - name: Export dependency sources
        if: steps.source_dependency.outputs.cache_hit != 'true'
        run: scripts/export-container-sources.sh dependencies .container-source-state .container-source-dependencies.tar.gz

      - name: Publish dependency source layer
        if: steps.source_dependency.outputs.cache_hit != 'true'
        env:
          DEPENDENCY_TAG_REF: ${{ steps.source_dependency.outputs.tag_ref }}
        run: |
          set -euo pipefail

          nix run nixpkgs#crane -- append \
            --oci-empty-base \
            --new_layer .container-source-dependencies.tar.gz \
            --new_tag "${DEPENDENCY_TAG_REF}"

      - name: Resolve dependency source layer
        id: resolved_source_dependency
        shell: bash
        env:
          DEPENDENCY_TAG_REF: ${{ steps.source_dependency.outputs.tag_ref }}
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          dependency_digest="$(
            nix run nixpkgs#crane -- digest "${DEPENDENCY_TAG_REF}"
          )"
          if [[ ! "${dependency_digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Invalid dependency source manifest digest."
            exit 1
          fi
          printf 'ref=%s@%s\n' \
            "${image}" \
            "${dependency_digest}" \
            >> "${GITHUB_OUTPUT}"

      - name: Export release sources
        shell: bash
        env:
          ARTIFACT_PREFIX: ${{ inputs.artifact-prefix }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          release_path="dist/${ARTIFACT_PREFIX}-${ARCH}-source-release.tar.gz"
          scripts/export-container-sources.sh \
            release \
            .container-source-state \
            "${release_path}"

      - name: Publish architecture source image
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          ARTIFACT_PREFIX: ${{ inputs.artifact-prefix }}
          DEPENDENCY_REF: ${{ steps.resolved_source_dependency.outputs.ref }}
          SHA_TAG_PREFIX: ${{ inputs.sha-tag-prefix }}
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          sha_tag="${SHA_TAG_PREFIX}-${GITHUB_SHA::12}"
          source_ref="${image}:${sha_tag}-sources-${ARCH}"
          release_path="dist/${ARTIFACT_PREFIX}-${ARCH}-source-release.tar.gz"
          manifest_path="dist/${ARTIFACT_PREFIX}-sources-${ARCH}.manifest.json"
          descriptor_path="dist/${ARTIFACT_PREFIX}-sources-${ARCH}.descriptor.json"

          nix run nixpkgs#crane -- append \
            --base "${DEPENDENCY_REF}" \
            --new_layer "${release_path}" \
            --new_tag "${source_ref}"

          manifest_digest="$(nix run nixpkgs#crane -- digest "${source_ref}")"
          if [[ ! "${manifest_digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Invalid architecture source manifest digest."
            exit 1
          fi
          nix run nixpkgs#crane -- manifest "${source_ref}" > "${manifest_path}"
          manifest_size="$(wc -c < "${manifest_path}" | tr -d ' ')"
          media_type="$(jq -r '.mediaType' "${manifest_path}")"
          jq -n \
            --arg arch "${ARCH}" \
            --arg digest "${manifest_digest}" \
            --arg media_type "${media_type}" \
            --argjson size "${manifest_size}" \
            '{
              mediaType: $media_type,
              digest: $digest,
              size: $size,
              platform: {
                architecture: $arch,
                os: "linux"
              }
            }' > "${descriptor_path}"

      - name: Publish architecture Docker image
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          ARTIFACT_PREFIX: ${{ inputs.artifact-prefix }}
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_archive="dist/${ARTIFACT_PREFIX}-${ARCH}.tar.gz"
          docker_tar="${image_archive%.gz}"
          manifest_path="dist/${ARTIFACT_PREFIX}-runtime-${ARCH}.manifest.json"
          descriptor_path="dist/${ARTIFACT_PREFIX}-runtime-${ARCH}.descriptor.json"

          gzip -dc "${image_archive}" > "${docker_tar}"
          manifest_digest="$(
            nix run nixpkgs#crane -- digest --tarball "${docker_tar}"
          )"
          if [[ ! "${manifest_digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Invalid architecture Docker manifest digest."
            exit 1
          fi
          nix run nixpkgs#crane -- push \
            "${docker_tar}" \
            "${image}@${manifest_digest}"
          nix run nixpkgs#crane -- manifest \
            "${image}@${manifest_digest}" \
            > "${manifest_path}"
          manifest_size="$(wc -c < "${manifest_path}" | tr -d ' ')"
          media_type="$(jq -r '.mediaType' "${manifest_path}")"
          jq -n \
            --arg arch "${ARCH}" \
            --arg digest "${manifest_digest}" \
            --arg media_type "${media_type}" \
            --argjson size "${manifest_size}" \
            '{
              mediaType: $media_type,
              digest: $digest,
              size: $size,
              platform: {
                architecture: $arch,
                os: "linux"
              }
            }' > "${descriptor_path}"

      - name: Upload publication metadata
        uses: actions/upload-artifact@v7
        with:
          name: "${{ inputs.artifact-prefix }}-image-metadata-${{ matrix.arch }}"
          path: |
            dist/${{ inputs.artifact-prefix }}-runtime-${{ matrix.arch }}.descriptor.json
            dist/${{ inputs.artifact-prefix }}-sources-${{ matrix.arch }}.descriptor.json
          if-no-files-found: error
          retention-days: 1

  publish-image:
    needs:
      - publish-image-arch
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download publication metadata
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: "${{ inputs.artifact-prefix }}-image-metadata-*"
          merge-multiple: true

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Publish Docker image
        shell: bash
        env:
          ARTIFACT_PREFIX: ${{ inputs.artifact-prefix }}
          MANUAL_TAG: ${{ inputs.manual-tag }}
          PUBLISH_LATEST_ON_MAIN: ${{ inputs.publish-latest-on-main }}
          PUBLISH_GIT_TAG: ${{ inputs.publish-git-tag }}
          SHA_TAG_PREFIX: ${{ inputs.sha-tag-prefix }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          sha_tag="${SHA_TAG_PREFIX}-${GITHUB_SHA::12}"
          runtime_descriptors=()
          source_descriptors=()

          validate_descriptor() {
            local descriptor_path="$1"
            local arch="$2"

            if ! jq -e --arg arch "${arch}" '
              (
                .mediaType == "application/vnd.oci.image.manifest.v1+json"
                or
                .mediaType == "application/vnd.docker.distribution.manifest.v2+json"
              )
              and (.digest | test("^sha256:[0-9a-f]{64}$"))
              and ((.size | type) == "number")
              and (.size > 0)
              and (.platform.os == "linux")
              and (.platform.architecture == $arch)
            ' "${descriptor_path}" >/dev/null; then
              echo "::error::Invalid publication descriptor: ${descriptor_path}"
              exit 1
            fi
          }

          artifact_files=(artifacts/*)
          for artifact_file in "${artifact_files[@]}"; do
            case "$(basename "${artifact_file}")" in
              "${ARTIFACT_PREFIX}-runtime-amd64.descriptor.json" | \
              "${ARTIFACT_PREFIX}-runtime-arm64.descriptor.json" | \
              "${ARTIFACT_PREFIX}-sources-amd64.descriptor.json" | \
              "${ARTIFACT_PREFIX}-sources-arm64.descriptor.json")
                ;;
              *)
                echo "::error::Unexpected publication metadata: ${artifact_file}"
                exit 1
                ;;
            esac
          done

          for arch in amd64 arm64; do
            runtime_descriptor="artifacts/${ARTIFACT_PREFIX}-runtime-${arch}.descriptor.json"
            source_descriptor="artifacts/${ARTIFACT_PREFIX}-sources-${arch}.descriptor.json"
            if [[ ! -e "${runtime_descriptor}" && ! -e "${source_descriptor}" ]]; then
              continue
            fi
            if [[ ! -f "${runtime_descriptor}" || ! -f "${source_descriptor}" ]]; then
              echo "::error::Incomplete publication metadata for ${arch}."
              exit 1
            fi

            validate_descriptor "${runtime_descriptor}" "${arch}"
            validate_descriptor "${source_descriptor}" "${arch}"
            runtime_descriptors+=("${runtime_descriptor}")
            source_descriptors+=("${source_descriptor}")
          done

          if ((${#runtime_descriptors[@]} == 0)); then
            echo "::error::No Docker image manifests were built."
            exit 1
          fi

          publish_index() {
            local tag="$1"
            shift
            local descriptor_args=()
            local descriptor_path

            for descriptor_path in "$@"; do
              descriptor_args+=("--file" "${descriptor_path}")
            done
            docker buildx imagetools create \
              "${descriptor_args[@]}" \
              --tag "${image}:${tag}"
          }

          publish_alias() {
            local tag="$1"

            docker buildx imagetools create \
              --tag "${image}:${tag}-sources" \
              "${image}:${sha_tag}-sources"
            docker buildx imagetools create \
              --tag "${image}:${tag}" \
              "${image}:${sha_tag}"
          }

          publish_index "${sha_tag}-sources" "${source_descriptors[@]}"
          publish_index "${sha_tag}" "${runtime_descriptors[@]}"

          if [[ "${PUBLISH_LATEST_ON_MAIN}" == "true" && "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            publish_alias "latest"
          fi

          if [[ "${PUBLISH_GIT_TAG}" == "true" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            publish_alias "${GITHUB_REF_NAME}"
          fi

          if [[ -n "${MANUAL_TAG}" ]]; then
            publish_alias "${MANUAL_TAG}"
          fi
