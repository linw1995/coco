name: "CD"

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish-image-arch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            nix-output: .#coco-image-linux-amd64
            extra-platforms: x86_64-linux
          - arch: arm64
            nix-output: .#coco-image-linux-arm64
            extra-platforms: aarch64-linux
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
        if: matrix.arch == 'arm64'
        with:
          platforms: arm64
      - uses: ./.github/actions/setup-nix

      - name: Build Docker image
        env:
          NIX_CONFIG: |
            extra-platforms = ${{ matrix.extra-platforms }}
        run: nix build --out-link image "${{ matrix.nix-output }}" --print-build-logs

      - name: Load Docker image
        run: docker load --input image

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Publish Docker image
        shell: bash
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          arch_tag="sha-${GITHUB_SHA::12}-${{ matrix.arch }}"

          docker tag coco:latest "${image}:${arch_tag}"
          docker push "${image}:${arch_tag}"

  publish-image-manifest:
    needs:
      - publish-image-arch
    runs-on: ubuntu-latest
    steps:
      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Publish Docker image manifests
        shell: bash
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          sha_tag="sha-${GITHUB_SHA::12}"
          amd64_tag="${image}:${sha_tag}-amd64"
          arm64_tag="${image}:${sha_tag}-arm64"

          publish_manifest() {
            local tag="$1"
            docker manifest rm "${image}:${tag}" >/dev/null 2>&1 || true
            docker manifest create "${image}:${tag}" "${amd64_tag}" "${arm64_tag}"
            docker manifest push --purge "${image}:${tag}"
          }

          publish_manifest "${sha_tag}"

          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            publish_manifest "latest"
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            publish_manifest "${GITHUB_REF_NAME}"
          fi
