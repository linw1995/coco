name: "CD"

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix

      - name: Build Docker image
        run: nix build --out-link image .#coco-image --print-build-logs

      - name: Load Docker image
        run: docker load --input image

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Publish Docker image
        shell: bash
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          sha_tag="sha-${GITHUB_SHA::12}"

          docker tag coco:latest "${image}:${sha_tag}"
          docker push "${image}:${sha_tag}"

          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            docker tag coco:latest "${image}:latest"
            docker push "${image}:latest"
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            docker tag coco:latest "${image}:${GITHUB_REF_NAME}"
            docker push "${image}:${GITHUB_REF_NAME}"
          fi
