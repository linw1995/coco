name: "CD"

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish-image-arch:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            nix-output: .#coco-image-linux-amd64
            extra-platforms: x86_64-linux
          - arch: arm64
            nix-output: .#coco-image-linux-arm64
            extra-platforms: aarch64-linux
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
        if: matrix.arch == 'arm64'
        with:
          platforms: arm64
      - uses: ./.github/actions/setup-nix

      - name: Build Docker image
        env:
          NIX_CONFIG: |
            extra-platforms = ${{ matrix.extra-platforms }}
        run: nix build --out-link image "${{ matrix.nix-output }}" --print-build-logs

      - name: Prepare Docker image artifact
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          cp --dereference image "dist/coco-${{ matrix.arch }}.tar.gz"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v7
        with:
          name: "coco-image-${{ matrix.arch }}"
          path: "dist/coco-${{ matrix.arch }}.tar.gz"
          compression-level: 0
          if-no-files-found: error
          retention-days: 1

  publish-image:
    needs:
      - publish-image-arch
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix

      - name: Download Docker image artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: "coco-image-*"
          merge-multiple: true

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Publish Docker image
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          sha_tag="sha-${GITHUB_SHA::12}"
          image_files=(artifacts/coco-*.tar.gz)

          if ((${#image_files[@]} == 0)); then
            echo "::error::No Docker image artifacts were built."
            exit 1
          fi

          local_images=()

          for image_file in "${image_files[@]}"; do
            case "$(basename "${image_file}")" in
              coco-amd64.tar.gz)
                local_tag="coco:amd64"
                ;;
              coco-arm64.tar.gz)
                local_tag="coco:arm64"
                ;;
              *)
                echo "::error::Unexpected Docker image artifact: ${image_file}"
                exit 1
                ;;
            esac

            docker load --input "${image_file}"
            image_id="$(docker image inspect coco:latest --format '{{ .Id }}')"
            docker tag "${image_id}" "${local_tag}"
            docker rmi coco:latest
            local_images+=("${local_tag}")
          done

          docker save --output coco-images.tar "${local_images[@]}"

          crane_args=()
          if ((${#local_images[@]} > 1)); then
            crane_args+=(--index)
          fi

          publish_image() {
            local tag="$1"
            nix run nixpkgs#crane -- push "${crane_args[@]}" coco-images.tar "${image}:${tag}"
          }

          publish_image "${sha_tag}"

          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            publish_image "latest"
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            publish_image "${GITHUB_REF_NAME}"
          fi
