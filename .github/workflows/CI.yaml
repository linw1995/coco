name: "CI"

on:
  pull_request:
  push:
    branches:
      - "main"

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      lint: ${{ steps.filter.outputs.lint }}
      rust: ${{ steps.filter.outputs.rust }}
      builtin_skill_scripts: ${{ steps.filter.outputs.builtin_skill_scripts }}
      nix_build: ${{ steps.filter.outputs.nix_build }}
    steps:
      - uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            lint:
              - ".github/workflows/CI.yaml"
              - ".github/actions/setup-nix/action.yaml"
              - ".pre-commit-config.yaml"
              - "Cargo.lock"
              - "Cargo.toml"
              - "**/Cargo.toml"
              - "flake.nix"
              - "flake.lock"
              - "nix/**/*.nix"
              - "*.md"
              - "**/*.md"
              - "**/*.py"
              - "**/*.rs"
              - "**/*.toml"
              - "**/*.yaml"
              - "**/*.yml"
            rust:
              - ".github/workflows/CI.yaml"
              - ".github/actions/setup-nix/action.yaml"
              - "Cargo.lock"
              - "Cargo.toml"
              - "**/Cargo.toml"
              - "flake.nix"
              - "flake.lock"
              - "nix/**/*.nix"
              - "scripts/run-cov.sh"
              - "scripts/run-crap.sh"
              - "coco-*/src/**"
              - "coco-*/tests/**"
              - "coco-console/build.rs"
              - "coco-console/templates/**"
              - "coco-mem/src/default_skills/**"
            builtin_skill_scripts:
              - ".github/workflows/CI.yaml"
              - "scripts/test-builtin-skill-scripts.sh"
              - "coco-mem/src/default_skills/**/*.py"
            nix_build:
              - ".github/workflows/CI.yaml"
              - ".github/actions/setup-nix/action.yaml"
              - "Cargo.lock"
              - "Cargo.toml"
              - "**/Cargo.toml"
              - "flake.nix"
              - "flake.lock"
              - "nix/**/*.nix"
              - "docker/**"
              - "coco-*/src/**"
              - "coco-*/tests/**"
              - "coco-console/build.rs"
              - "coco-console/templates/**"
              - "coco-mem/src/default_skills/**"

  lint:
    needs:
      - changes
    if: needs.changes.outputs.lint == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix

      - name: Run repository checks
        run: nix develop --command prek -a

  test:
    needs:
      - changes
      - lint
    if: ${{ always() && needs.changes.outputs.rust == 'true' && (needs.lint.result == 'success' || needs.lint.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix

      - name: Run workspace tests with coverage
        run: nix develop --command bash scripts/run-cov.sh

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: target/coverage/result/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: target/coverage/result/lcov.info
          flags: rust
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  crap:
    needs:
      - changes
      - test
    if: ${{ always() && needs.changes.outputs.rust == 'true' && needs.test.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
        with:
          cache-key-name: test

      - name: Download coverage artifact
        uses: actions/download-artifact@v7
        with:
          name: coverage
          path: target/coverage/result/

      - name: Run CRAP metric check
        run: nix develop --command bash scripts/run-crap.sh

      - name: Upload CRAP metric artifact
        uses: actions/upload-artifact@v7
        with:
          name: crap
          path: target/coverage/result/crap.md

  builtin-skill-scripts:
    needs:
      - changes
      - lint
    if: ${{ always() && needs.changes.outputs.builtin_skill_scripts == 'true' && (needs.lint.result == 'success' || needs.lint.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run builtin skill script tests
        run: bash scripts/test-builtin-skill-scripts.sh

  nix-build:
    needs:
      - changes
      - lint
    if: ${{ always() && needs.changes.outputs.nix_build == 'true' && (needs.lint.result == 'success' || needs.lint.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix

      - name: Build binary
        run: nix build --profile default .#coco-cli --print-build-logs

      - name: Check flake
        run: nix flake check --no-build

      - name: Build Docker image
        run: nix build --out-link image .#coco-image --print-build-logs
