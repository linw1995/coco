name: "CI"

on:
  pull_request:
  push:
    branches:
      - "main"

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      lint: ${{ steps.filter.outputs.lint }}
      rust: ${{ steps.filter.outputs.rust }}
      wasm_coverage: ${{ steps.filter.outputs.wasm_coverage }}
      builtin_skill_scripts: ${{ steps.filter.outputs.builtin_skill_scripts }}
      nix_build: ${{ steps.filter.outputs.nix_build }}
    steps:
      - uses: actions/checkout@v7

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            lint:
              - ".github/workflows/CI.yaml"
              - ".github/actions/setup-nix/action.yaml"
              - ".pre-commit-config.yaml"
              - "Cargo.lock"
              - "Cargo.toml"
              - "**/Cargo.toml"
              - "flake.nix"
              - "flake.lock"
              - "nix/**/*.nix"
              - "*.md"
              - "**/*.md"
              - "**/*.py"
              - "**/*.rs"
              - "**/*.sh"
              - "**/*.toml"
              - "**/*.yaml"
              - "**/*.yml"
            rust:
              - ".github/workflows/CI.yaml"
              - ".github/actions/setup-nix/action.yaml"
              - "Cargo.lock"
              - "Cargo.toml"
              - "**/Cargo.toml"
              - "flake.nix"
              - "flake.lock"
              - "nix/**/*.nix"
              - "scripts/run-cov.sh"
              - "scripts/run-wasm-cov.sh"
              - "scripts/merge-cov.sh"
              - "scripts/run-crap.sh"
              - "coco-*/src/**"
              - "coco-*/tests/**"
              - "coco-console/build.rs"
              - "coco-console/migrations/**"
              - "coco-console/templates/**"
              - "coco-mem/src/default_skills/**"
            wasm_coverage:
              - ".github/workflows/CI.yaml"
              - ".github/actions/setup-nix/action.yaml"
              - "Cargo.lock"
              - "Cargo.toml"
              - "**/Cargo.toml"
              - "flake.nix"
              - "flake.lock"
              - "nix/**/*.nix"
              - "scripts/run-wasm-cov.sh"
              - "scripts/merge-cov.sh"
              - "coco-console/src/api.rs"
              - "coco-console/src/lib.rs"
              - "coco-console/src/wasm/**"
            builtin_skill_scripts:
              - ".github/workflows/CI.yaml"
              - ".github/actions/setup-nix/action.yaml"
              - "flake.nix"
              - "flake.lock"
              - "nix/**/*.nix"
              - "scripts/test-builtin-skill-scripts.sh"
              - "coco-mem/src/default_skills/**/*.py"
            nix_build:
              - ".github/workflows/CI.yaml"
              - ".github/actions/setup-nix/action.yaml"
              - "Cargo.lock"
              - "Cargo.toml"
              - "**/Cargo.toml"
              - "flake.nix"
              - "flake.lock"
              - "nix/**/*.nix"
              - "docker/**"
              - "coco-*/src/**"
              - "coco-*/tests/**"
              - "coco-console/build.rs"
              - "coco-console/migrations/**"
              - "coco-console/templates/**"
              - "coco-mem/src/default_skills/**"

  lint:
    needs:
      - changes
    if: needs.changes.outputs.lint == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-nix
        with:
          dev-shell: ci-lint

      - name: Run repository checks
        run: nix develop .#ci-lint --command prek -a

  coverage_native:
    needs:
      - changes
      - lint
    if: ${{ always() && needs.changes.outputs.rust == 'true' && (needs.lint.result == 'success' || needs.lint.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-nix
        with:
          cache-key-name: coverage
          dev-shell: ci-coverage

      - name: Run native coverage
        run: nix develop .#ci-coverage --command bash scripts/run-cov.sh

      - name: Upload native coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-native
          path: target/coverage/result/

  coverage_wasm:
    needs:
      - changes
      - lint
    if: ${{ always() && needs.changes.outputs.rust == 'true' && needs.changes.outputs.wasm_coverage == 'true' && (needs.lint.result == 'success' || needs.lint.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-nix
        with:
          cache-key-name: wasm-coverage
          dev-shell: ci-wasm-coverage

      - name: Run wasm browser coverage
        run: nix develop .#ci-wasm-coverage --command bash scripts/run-wasm-cov.sh

      - name: Upload wasm coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-wasm
          path: target/wasm-coverage/result/wasm.lcov.info

  coverage:
    needs:
      - changes
      - coverage_native
      - coverage_wasm
    if: ${{ always() && needs.changes.outputs.rust == 'true' && needs.coverage_native.result == 'success' && (needs.coverage_wasm.result == 'success' || needs.coverage_wasm.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download native coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-native
          path: target/coverage/result/

      - name: Download wasm coverage artifact
        if: needs.coverage_wasm.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: coverage-wasm
          path: target/wasm-coverage/result/

      - name: Merge coverage reports
        run: bash scripts/merge-cov.sh

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: target/coverage/result/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: target/coverage/result/lcov.info
          flags: rust
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  crap:
    needs:
      - changes
      - coverage
    if: ${{ always() && needs.changes.outputs.rust == 'true' && needs.coverage.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-nix
        with:
          cache-key-name: crap
          dev-shell: crap

      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage
          path: target/coverage/result/

      - name: Run CRAP metric check
        run: nix develop .#crap --command bash scripts/run-crap.sh

      - name: Upload CRAP metric artifact
        uses: actions/upload-artifact@v7
        with:
          name: crap
          path: target/coverage/result/crap.md

  builtin-skill-scripts:
    needs:
      - changes
      - lint
    if: ${{ always() && needs.changes.outputs.builtin_skill_scripts == 'true' && (needs.lint.result == 'success' || needs.lint.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-nix
        with:
          cache-key-name: builtin-skill-scripts
          dev-shell: builtin-skill-scripts

      - name: Run builtin skill script tests
        run: nix develop .#builtin-skill-scripts --command bash scripts/test-builtin-skill-scripts.sh

  nix-build:
    needs:
      - changes
      - lint
    if: ${{ always() && needs.changes.outputs.nix_build == 'true' && (needs.lint.result == 'success' || needs.lint.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-nix

      - name: Build binary
        run: nix build --profile default .#coco-cli --print-build-logs

      - name: Check flake
        run: nix flake check --no-build

      - name: Build Docker image
        run: nix build --out-link image .#coco-image --print-build-logs
