name: "CI"

on:
  pull_request:
  push:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix

      - name: Run repository checks
        run: nix develop --command prek -a

  test:
    needs:
      - lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix

      - name: Run workspace tests with coverage
        run: nix develop --command bash scripts/run-cov.sh

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: target/coverage/result/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: target/coverage/result/lcov.info
          flags: rust
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  crap:
    needs:
      - test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
        with:
          cache-key-name: test

      - name: Download coverage artifact
        uses: actions/download-artifact@v7
        with:
          name: coverage
          path: target/coverage/result/

      - name: Run CRAP metric check
        run: nix develop --command bash scripts/run-crap.sh

      - name: Upload CRAP metric artifact
        uses: actions/upload-artifact@v7
        with:
          name: crap
          path: target/coverage/result/crap.md

  builtin-skill-scripts:
    needs:
      - lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run builtin skill script tests
        run: bash scripts/test-builtin-skill-scripts.sh

  nix-build:
    needs:
      - lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix

      - name: Build binary
        run: nix build --profile default .#coco-cli --print-build-logs

      - name: Check flake
        run: nix flake check --no-build

      - name: Build Docker image
        run: nix build --out-link image .#coco-image --print-build-logs
