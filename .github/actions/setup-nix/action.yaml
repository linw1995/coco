name: "Setup Nix Environment"
description: "Install Nix and restore caches used by flake builds."
runs:
  using: composite
  steps:
    - uses: nixbuild/nix-quick-install-action@v33
      with:
        nix_conf: |
          keep-env-derivations = true
          keep-outputs = true

    - name: Restore and save Nix store
      uses: nix-community/cache-nix-action@v6
      with:
        # Cache crane's nix build dependency artifacts by Cargo.lock and flake inputs.
        primary-key: nix-store-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('Cargo.lock', '**/Cargo.toml', 'flake.nix', 'flake.lock') }}
        gc-max-store-size-linux: 15G

    - name: Cache Cargo dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('Cargo.lock', '**/Cargo.toml') }}
        restore-keys: |
          cargo-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-

    - name: Setup nix develop env
      shell: bash
      run: |
        echo 'use flake' > .envrc

    - uses: HatsuneMiku3939/direnv-action@v1
